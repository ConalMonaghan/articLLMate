# ==============================================================================
# Table routing config for: prompt_Ho
# ==============================================================================
# Defines how JSON response fields are split across output tables.
#
#   main:     Scalar values for the primary results table (one row per article)
#   metadata: Long-text fields (thinking, rationales) — kept separate to
#             avoid cluttering the main table
#   detail:   Array-of-objects fields — each array element becomes its own row
#             in a long-format detail table (one row per study per article)
#
# Any field not listed here defaults to "main".
# ==============================================================================

# ---- Relevance / skip logic ----
# No boolean relevance gate in this prompt.
# Exclusion is coded via screen_include_exclude (integer 1/2/3).
skip_if_false: []

# ---- Dashboard ----
# Fields to try (in order) when extracting a short critique for Google Sheets.
# First match wins. Use dot-separated paths for nested fields.
dashboard_critique_fields:
  - "thinking_chain_of_thought"
  - "summary_final"

# ---- Main table (scalar identifiers and coded variables) ----
main:
  - meta_title
  - meta_authors
  - meta_author_first_last
  - meta_year
  - meta_journal
  - meta_volume_issue_string
  - meta_volume
  - meta_issue
  - meta_doi
  - meta_pages
  - meta_n_authors
  - meta_n_institutions
  - meta_n_countries
  - meta_n_continents
  - meta_first_author_location
  - meta_confidence
  - screen_include_exclude
  - screen_confidence
  - structure_n_studies
  - structure_study_ids
  - structure_total_n_mothership
  - structure_shared_sample_flag
  - structure_confidence
  - demo_confidence
  - setting_participant_confidence
  - method_confidence

# ---- Metadata table (long-text rationales and narrative summaries) ----
metadata:
  - thinking_chain_of_thought
  - meta_rationale
  - screen_rationale
  - screen_rationale_confidence
  - structure_rationale
  - demo_rationale
  - setting_participant_rationale
  - method_rationale
  - summary_final

# ---- Detail table (one row per study per article) ----
# structure_studies is an array of per-study objects.
# Each element expands to its own row with columns for all per-study fields:
#   study_id, study_n, study_n_notes,
#   demo_gender_reported, demo_pct_female, demo_n_female, demo_pct_male, demo_n_male,
#   demo_pct_gender_minority, demo_n_gender_minority, demo_gender_as_reported_verbatim,
#   study_setting, participant_type, online_service_platform, online_service_platform_other,
#   participant_location, participant_type_note,
#   method, dv_measurement, outcome_type, method_notes
detail:
  - structure_studies
